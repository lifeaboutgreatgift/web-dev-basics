<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Day 5 - Objects</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <h1>Objects</h1>

        <!-- OBJECT DISPLAY -->
        <div class="section">
            <h2>User Profile</h2>
            <div id="profileCard" class="profile-card">
                <p>Click button to load profile!</p>
            </div>
            <button id="loadProfile">Load Profile</button>
            <button id="updateProfile">Update Age</button>
        </div>

        <!-- ARRAY OF OBJECTS -->
        <div class="section">
            <h2>Products List</h2>
            <button id="loadProducts">Load Products</button>
            <button id="filterExpensive">Filter (price > 500)</button>
            <button id="sortByPrice">Sort by Price</button>
            <div id="productsList" class="products-grid"></div>
        </div>

        <!-- OBJECT METHODS -->
        <div class="section">
            <h2>Object Methods</h2>
            <button id="getKeys">Get Keys</button>
            <button id="getValues">Get Values</button>
            <button id="getEntries">Get Entries</button>
            <div id="methodOutput"></div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
