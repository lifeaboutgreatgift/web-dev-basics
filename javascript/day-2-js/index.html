<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Day 2 - DOM Manipulation</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                padding: 40px;
                background-color: #f0f2f5;
            }

            .box {
                width: 150px;
                height: 150px;
                background-color: red;
                border-radius: 10px;
                margin: 20px 0;
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-weight: bold;
                transition: all 0.3s ease;
            }

            button {
                padding: 10px 20px;
                margin: 5px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 15px;
                background-color: #667eea;
                color: white;
                transition: 0.3s ease;
            }

            button:hover {
                opacity: 0.8;
            }

            #output {
                margin-top: 20px;
                padding: 15px;
                background-color: white;
                border-radius: 8px;
                font-size: 16px;
            }
        </style>
    </head>
    <body>

        <h1 id="heading">DOM Manipulation</h1>
        <p id="paragraph">Watch me change!</p>

        <div class="box" id="box">Box</div>

        <button id="btn1">Change Text</button>
        <button id="btn2">Change Color</button>
        <button id="btn3">Change Size</button>
        <button id="btn4">Reset</button>

        <div id="output">Output will show here!</div>

        <script src="script.js"></script>
    </body>
</html>
