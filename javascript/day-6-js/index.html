<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Day 6 - ES6+</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <h1>ES6+ Modern JavaScript</h1>

        <div class="section">
            <h2>Arrow Functions</h2>
            <button id="arrowBtn">Test Arrow Functions</button>
            <div id="arrowOutput" class="output"></div>
        </div>

        <div class="section">
            <h2>Template Literals</h2>
            <input type="text" id="nameInput" placeholder="Enter your name">
            <input type="number" id="ageInput" placeholder="Enter your age">
            <button id="templateBtn">Generate Profile</button>
            <div id="templateOutput" class="output"></div>
        </div>

        <div class="section">
            <h2>Destructuring</h2>
            <button id="destructBtn">Test Destructuring</button>
            <div id="destructOutput" class="output"></div>
        </div>

        <div class="section">
            <h2>Spread & Rest</h2>
            <button id="spreadBtn">Test Spread</button>
            <button id="restBtn">Test Rest</button>
            <div id="spreadOutput" class="output"></div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
